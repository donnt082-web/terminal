<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>智能安全帽终端</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ═══ Login Overlay ═══ -->
  <div class="login-overlay" id="loginOverlay">
    <div class="login-card">
      <div class="login-logo">
        <svg width="36" height="36" viewBox="0 0 28 28" fill="none">
          <rect width="28" height="28" rx="8" fill="url(#lg-grad)"/>
          <path d="M8 18V10l6 4-6 4zm8-8v8l6-4-6-4z" fill="#fff"/>
          <defs><linearGradient id="lg-grad" x1="0" y1="0" x2="28" y2="28"><stop stop-color="#007AFF"/><stop offset="1" stop-color="#5856D6"/></linearGradient></defs>
        </svg>
        <h2>智能安全帽终端</h2>
        <p>请输入账号密码登录</p>
      </div>
      <form id="loginForm" autocomplete="on">
        <div class="login-field"><label>👤</label><input type="text" id="loginUser" placeholder="用户名" autocomplete="username"></div>
        <div class="login-field"><label>🔒</label><input type="password" id="loginPass" placeholder="密码" autocomplete="current-password"></div>
        <label class="login-remember"><input type="checkbox" id="chkRemember" checked><span class="checkmark"></span>记住密码，下次自动登录</label>
        <button type="submit" id="btnLogin">登 录</button>
        <p class="login-error" id="loginError"></p>
      </form>
    </div>
  </div>

  <!-- ═══ Navigation Bar ═══ -->
  <nav class="nav">
    <div class="nav-left">
      <div class="nav-logo">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
          <rect width="28" height="28" rx="8" fill="url(#logo-grad)"/>
          <path d="M8 18V10l6 4-6 4zm8-8v8l6-4-6-4z" fill="#fff"/>
          <defs>
            <linearGradient id="logo-grad" x1="0" y1="0" x2="28" y2="28">
              <stop stop-color="#007AFF"/><stop offset="1" stop-color="#5856D6"/>
            </linearGradient>
          </defs>
        </svg>
        <span class="nav-title">智能安全帽</span>
      </div>
      <div class="nav-meta" id="navMeta">
        <span class="nav-badge" id="navClientId">等待连接</span>
      </div>
    </div>
    <div class="nav-right">
      <span class="nav-user" id="navUser">admin</span>
      <div class="status-badge" id="statusBadge">
        <span class="status-dot" id="statusDot"></span>
        <span class="status-label" id="statusLabel">未连接</span>
      </div>
    </div>
  </nav>

  <!-- ═══ Main Content ═══ -->
  <main class="main">

    <!-- ─── Connection Sheet ─── -->
    <section class="connection-sheet" id="connectionSheet">
      <div class="sheet-body">
        <div class="field-group">
          <div class="field">
            <label for="serverAddr">服务器地址</label>
            <input type="text" id="serverAddr" value="localhost" placeholder="192.168.1.100" spellcheck="false">
          </div>
          <div class="field field-port">
            <label for="serverPort">端口</label>
            <input type="number" id="serverPort" value="3000" placeholder="3000">
          </div>
          <button class="btn-primary" id="btnConnect">
            <span class="btn-text">连接</span>
            <span class="btn-loader"></span>
          </button>
          <button class="btn-secondary" id="btnDisconnect" style="display:none;">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M4 4l8 8m0-8l-8 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
            断开
          </button>
        </div>
        <div class="connection-info" id="connectionInfo" style="display:none;">
          <div class="info-row">
            <span class="info-key">客户端 ID</span>
            <span class="info-val" id="infoClientId">—</span>
          </div>
          <div class="info-row">
            <span class="info-key">在线客户端</span>
            <span class="info-val" id="infoOnlineCount">0</span>
          </div>
          <div class="info-row">
            <span class="info-key">已收数据</span>
            <span class="info-val" id="infoDataCount">0</span>
          </div>
        </div>
      </div>
      <button class="sheet-toggle" id="sheetToggle" title="切换连接面板">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 10L3 6h8l-4 4z" fill="currentColor"/></svg>
      </button>
    </section>

    <!-- ─── Dashboard ─── -->
    <section class="dashboard" id="dashboard">


      <!-- Sensor Cards -->
      <div class="sensor-grid" id="sensorGrid">

        <!-- SpO₂ -->
        <div class="sensor-card" data-key="spO2" style="--card-delay:0">
          <div class="card-header">
            <span class="card-icon icon-spo2">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 1s5 5 5 9a5 5 0 01-10 0c0-4 5-9 5-9z" fill="currentColor" opacity=".3"/><path d="M8 2C6.5 4.5 4 7.5 4 10a4 4 0 008 0c0-2.5-2.5-5.5-4-8z" fill="currentColor"/></svg>
            </span>
            <span class="card-label">血氧饱和度</span>
          </div>
          <div class="card-value" id="val_spO2">
            <span class="num">—</span>
            <span class="unit">%</span>
          </div>
          <div class="card-bar">
            <div class="bar-track"><div class="bar-fill" id="bar_spO2" style="width:0%"></div></div>
          </div>
          <div class="card-footer">
            <span class="card-status" id="status_spO2">等待数据</span>
          </div>
        </div>

        <!-- Heart Rate -->
        <div class="sensor-card" data-key="heart_rate" style="--card-delay:1">
          <div class="card-header">
            <span class="card-icon icon-heart">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 14s5-3.5 5-6.5a3.5 3.5 0 00-6-2.5A3.5 3.5 0 003 7.5C3 10.5 8 14 8 14z" fill="currentColor"/></svg>
            </span>
            <span class="card-label">心率</span>
          </div>
          <div class="card-value" id="val_heart_rate">
            <span class="num">—</span>
            <span class="unit">bpm</span>
          </div>
          <div class="card-bar">
            <div class="bar-track"><div class="bar-fill" id="bar_heart_rate" style="width:0%"></div></div>
          </div>
          <div class="card-footer">
            <span class="card-status" id="status_heart_rate">等待数据</span>
          </div>
        </div>

        <!-- Gas Density -->
        <div class="sensor-card" data-key="density" style="--card-delay:2">
          <div class="card-header">
            <span class="card-icon icon-gas">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="6" fill="currentColor" opacity=".2"/><circle cx="8" cy="8" r="4" fill="currentColor" opacity=".5"/><circle cx="8" cy="8" r="2" fill="currentColor"/></svg>
            </span>
            <span class="card-label">气体浓度</span>
          </div>
          <div class="card-value" id="val_density">
            <span class="num">—</span>
            <span class="unit">ppm</span>
          </div>
          <div class="card-bar">
            <div class="bar-track"><div class="bar-fill" id="bar_density" style="width:0%"></div></div>
          </div>
          <div class="card-footer">
            <span class="card-status" id="status_density">等待数据</span>
          </div>
        </div>

        <!-- Temperature -->
        <div class="sensor-card" data-key="temperature" style="--card-delay:3">
          <div class="card-header">
            <span class="card-icon icon-temp">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 2a1 1 0 00-1 1v5.5a3 3 0 102 0V3a1 1 0 00-1-1z" fill="currentColor"/></svg>
            </span>
            <span class="card-label">温度</span>
          </div>
          <div class="card-value" id="val_temperature">
            <span class="num">—</span>
            <span class="unit">°C</span>
          </div>
          <div class="card-bar">
            <div class="bar-track"><div class="bar-fill" id="bar_temperature" style="width:0%"></div></div>
          </div>
          <div class="card-footer">
            <span class="card-status" id="status_temperature">等待数据</span>
          </div>
        </div>

        <!-- Humidity -->
        <div class="sensor-card" data-key="humidity" style="--card-delay:4">
          <div class="card-header">
            <span class="card-icon icon-humi">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 1s4 4.5 4 7.5a4 4 0 01-8 0C4 5.5 8 1 8 1z" fill="currentColor"/></svg>
            </span>
            <span class="card-label">湿度</span>
          </div>
          <div class="card-value" id="val_humidity">
            <span class="num">—</span>
            <span class="unit">%</span>
          </div>
          <div class="card-bar">
            <div class="bar-track"><div class="bar-fill" id="bar_humidity" style="width:0%"></div></div>
          </div>
          <div class="card-footer">
            <span class="card-status" id="status_humidity">等待数据</span>
          </div>
        </div>

        <!-- GPS Location -->
        <div class="sensor-card card-gps" data-key="location" style="--card-delay:5">
          <div class="card-header">
            <span class="card-icon icon-gps">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 1a5 5 0 00-5 5c0 4 5 9 5 9s5-5 5-9a5 5 0 00-5-5zm0 7a2 2 0 110-4 2 2 0 010 4z" fill="currentColor"/></svg>
            </span>
            <span class="card-label">GPS 位置</span>
          </div>
          <div class="card-value card-value-sm" id="val_location">
            <span class="num">—</span>
          </div>
          <div class="card-footer">
            <span class="card-status" id="status_location">等待数据</span>
          </div>
        </div>

      </div>

      <!-- ─── Alarm Section ─── -->
      <div class="alarm-section" id="alarmSection">
        <div class="alarm-header">
          <h3 class="section-title">警告状态</h3>
          <span class="alarm-summary" id="alarmSummary">一切正常</span>
        </div>
        <div class="alarm-row">
          <div class="alarm-chip" id="alarm_fall">
            <span class="alarm-ring"></span>
            <span class="alarm-icon">
              <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M4 11l5-7 5 7H4z" fill="currentColor" opacity=".3"/><path d="M9 4l5 7H4l5-7z" fill="currentColor"/></svg>
            </span>
            <span class="alarm-text">跌倒检测</span>
            <span class="alarm-badge" id="badge_fall">正常</span>
          </div>
        </div>
      </div>

    </section>

    <!-- ─── Log Section ─── -->
    <section class="log-section" id="logSection">
      <div class="log-header">
        <div class="log-header-left">
          <h3 class="section-title">消息日志</h3>
          <span class="log-count" id="logCount">0 条</span>
        </div>
        <div class="log-header-right">
          <label class="log-option">
            <input type="checkbox" id="chkAutoScroll" checked>
            <span class="checkmark"></span>
            自动滚动
          </label>
          <button class="btn-ghost" id="btnClearLog">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 4h10M5 4V2.5a.5.5 0 01.5-.5h3a.5.5 0 01.5.5V4M3 4v7.5a1 1 0 001 1h6a1 1 0 001-1V4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            清空
          </button>
        </div>
      </div>
      <div class="log-container" id="logContainer">
        <div class="log-empty" id="logEmpty">
          <svg width="40" height="40" viewBox="0 0 40 40" fill="none"><rect x="4" y="10" width="32" height="24" rx="3" stroke="currentColor" stroke-width="1.5" stroke-opacity=".2"/><path d="M12 18h16M12 24h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-opacity=".15"/></svg>
          <span>暂无日志</span>
        </div>
      </div>
    </section>

    <!-- ─── Control Section ─── -->
    <section class="control-section" id="controlSection">
      <div class="control-header">
        <h3>设备控制</h3>
        <span class="control-hint" id="controlHint">未连接</span>
      </div>
      <div class="control-grid">

        <div class="control-card" data-device="led">
          <div class="control-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
              <path d="M9 21h6M10 17h4M7 11a5 5 0 1110 0c0 2-1 3-2 4H9c-1-1-2-2-2-4z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <div class="control-info">
            <span class="control-label">LED 灯</span>
            <span class="control-state" id="state_led">已关闭</span>
          </div>
          <button type="button" class="ctrl-switch" data-target="led" role="switch" aria-checked="false" aria-label="切换 LED 灯" title="切换 LED 灯">
            <span class="switch-track"><span class="switch-thumb"></span></span>
          </button>
        </div>

        <div class="control-card" data-device="fan">
          <div class="control-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
              <path d="M12 12V3a4 4 0 014 4c0 2-2 3-4 5zM12 12h9a4 4 0 01-4 4c-2 0-3-2-5-4zM12 12v9a4 4 0 01-4-4c0-2 2-3 4-5zM12 12H3a4 4 0 014-4c2 0 3 2 5 4z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
              <circle cx="12" cy="12" r="1.5" fill="currentColor"/>
            </svg>
          </div>
          <div class="control-info">
            <span class="control-label">风扇</span>
            <span class="control-state" id="state_fan">已关闭</span>
          </div>
          <button type="button" class="ctrl-switch" data-target="fan" role="switch" aria-checked="false" aria-label="切换风扇" title="切换风扇">
            <span class="switch-track"><span class="switch-thumb"></span></span>
          </button>
        </div>

      </div>
    </section>

    <!-- ─── History Section ─── -->
    <section class="history-section" id="historySection">
      <div class="history-header">
        <div class="history-header-left">
          <h3 class="section-title">历史数据</h3>
          <span class="history-count" id="historyCount">0 条</span>
        </div>
        <div class="history-header-right">
          <button class="btn-ghost" id="btnRefreshHistory">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M1 7a6 6 0 1112 0 6 6 0 01-12 0z" stroke="currentColor" stroke-width="1.2" fill="none"/><path d="M7 3.5V7l2.5 1.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
            刷新
          </button>
          <select class="history-range" id="historyRange" title="选择显示条数">
            <option value="10">最近 10 条</option>
            <option value="50" selected>最近 50 条</option>
            <option value="100">最近 100 条</option>
          </select>
        </div>
      </div>
      <!-- 折线图：历史趋势（多指标合并）-->
      <div class="history-chart-wrap">
        <div class="chart-legend" id="chartLegend">
          <button type="button" class="chart-legend-item active" data-metric="spO2" data-color="--color-spo2"><span class="legend-dot"></span>血氧</button>
          <button type="button" class="chart-legend-item active" data-metric="heart_rate" data-color="--color-heart"><span class="legend-dot"></span>心率</button>
          <button type="button" class="chart-legend-item active" data-metric="density" data-color="--color-gas"><span class="legend-dot"></span>浓度</button>
          <button type="button" class="chart-legend-item active" data-metric="temperature" data-color="--color-temp"><span class="legend-dot"></span>温度</button>
          <button type="button" class="chart-legend-item active" data-metric="humidity" data-color="--color-humi"><span class="legend-dot"></span>湿度</button>
        </div>
        <div class="chart-canvas-wrap">
          <svg id="historyChart" class="history-chart" preserveAspectRatio="none"></svg>
          <div class="chart-empty" id="chartEmpty">暂无数据</div>
        </div>
      </div>
      <div class="history-body">
        <table class="history-table">
          <thead>
            <tr>
              <th>时间</th>
              <th>血氧</th>
              <th>心率</th>
              <th>浓度</th>
              <th>温度</th>
              <th>湿度</th>
              <th>位置</th>
              <th>状态</th>
            </tr>
          </thead>
          <tbody id="historyBody">
            <tr class="history-empty">
              <td colspan="8">
                <span>暂无历史数据</span>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>

  </main>

  <script src="js/websocket.js"></script>
  <script src="js/app.js"></script>
  <script>
  // ── Login (不干扰 app.js 初始化) ──
  (function(){
    var U='admin', P='123456789', KEY='terminal_auth';
    var ov=document.getElementById('loginOverlay');
    var fm=document.getElementById('loginForm');
    if(!ov||!fm)return;
    // 设置导航栏用户名
    function setNavUser(name){
      var el=document.getElementById('navUser');if(el)el.textContent=name;
    }
    // 自动登录
    try{
      var raw=localStorage.getItem(KEY);
      if(raw){
        var s=JSON.parse(raw);
        if(s.u===U&&s.p===P){var u=document.getElementById('loginUser');var p=document.getElementById('loginPass');if(u)u.value=s.u;if(p)p.value=s.p;setNavUser(s.u);ov.classList.add('hidden');return;}
      }
    }catch(e){}
    // 手动登录
    fm.addEventListener('submit',function(e){
      e.preventDefault();
      var u=document.getElementById('loginUser');
      var p=document.getElementById('loginPass');
      var err=document.getElementById('loginError');
      if(!u||!p)return;
      if(u.value!==U||p.value!==P){if(err)err.textContent='用户名或密码错误';return;}
      if(err)err.textContent='';
      setNavUser(u.value);
      if(document.getElementById('chkRemember').checked){
        try{localStorage.setItem(KEY,JSON.stringify({u:u.value,p:p.value}));}catch(e){}
      }
      ov.classList.add('hidden');
    });
  })();
  </script>
</body>
</html>
